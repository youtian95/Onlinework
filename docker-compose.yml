version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: onlinework-backend
    restart: always
    volumes:
      - ./backend/db:/app/backend/db
      - ./backend/problems:/app/backend/problems
      - ./backend/public:/app/backend/public
      - ./backend/archive:/app/backend/archive
      - ./.env.secret:/app/.env.secret
    environment:
      - TZ=Asia/Shanghai

  frontend:
    build:
      context: frontend  # 构建上下文是 frontend 目录
      dockerfile: Dockerfile
    container_name: onlinework-frontend
    restart: always
    ports:
      - "80:80"  # 将宿主机的 80 端口映射到容器的 80 端口
    depends_on:
      - backend
